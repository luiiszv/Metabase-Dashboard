
services:
  metabse:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabaseappdb
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: mysecretpassword
      MB_DB_HOST: postgres

  postgres:
    image: postgres:16
    container_name: postgres
    hostname: postgres
    ports:
    - "5432:5432"
    environment:
      POSTGRES_USER: metabase
      POSTGRES_DB: metabaseappdb
      POSTGRES_PASSWORD: mysecretpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mongo:
    image: mongo:6.0
    container_name: mongito
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: redash
      MONGO_INITDB_ROOT_PASSWORD: redash
    volumes:
      - mongo-data:/data/db

    # restart: unless-stopped 

volumes:
  mongo-data:
  postgres-data:
  metabse-data:

networks:
  metabasenet:
    driver: bridge
